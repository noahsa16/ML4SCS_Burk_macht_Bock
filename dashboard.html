<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burk macht Bock — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,500;1,600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="/static/css/base.css">
<link rel="stylesheet" href="/static/css/topbar.css">
<link rel="stylesheet" href="/static/css/recording.css">
<link rel="stylesheet" href="/static/css/sessions.css">
<link rel="stylesheet" href="/static/css/session-detail.css">
<link rel="stylesheet" href="/static/css/connections.css">
<link rel="stylesheet" href="/static/css/system.css">
<link rel="stylesheet" href="/static/css/footer.css">
<link rel="modulepreload" href="/static/dashboard.js">
<link rel="modulepreload" href="/static/js/core/state.js">
<link rel="modulepreload" href="/static/js/core/ws.js">
<link rel="modulepreload" href="/static/js/core/status_cluster.js">
<link rel="modulepreload" href="/static/js/core/router.js">
<link rel="modulepreload" href="/static/js/core/format.js">
<link rel="modulepreload" href="/static/js/core/dom.js">
<link rel="modulepreload" href="/static/js/core/api.js">
<link rel="modulepreload" href="/static/js/core/theme.js">
<link rel="modulepreload" href="/static/js/core/anim.js">
<link rel="modulepreload" href="/static/js/core/toast.js">
</head>
<body>

<!-- ═══════════════════════ MAIN ══════════════════════════════ -->
<main id="main">
  <!-- Top bar: Brand · Tabs · Status -->
  <div id="topbar">
    <button type="button" class="brand" onclick="goHome()">
      <span>Burk macht Bock</span><span class="brand-slash">/</span>
      <span class="brand-tooltip" aria-hidden="true">
        <span class="brand-tooltip-line">ML4SCS · Writing Activity Study</span>
        <span class="brand-tooltip-line muted">Noah Samel · Ben Kriegsmann · Tajuddin Snasni</span>
      </span>
    </button>
    <nav class="tabs" role="tablist">
      <button type="button" class="tab active" data-page="recording"   role="tab">Recording</button>
      <button type="button" class="tab"        data-page="sessions"    role="tab">Sessions</button>
      <button type="button" class="tab"        data-page="connections" role="tab">Connections</button>
      <button type="button" class="tab"        data-page="system"      role="tab">System</button>
      <span class="tab-indicator" id="tabIndicator" aria-hidden="true"></span>
    </nav>
    <div class="topbar-right">
      <button type="button" class="status-cluster" id="statusCluster"
              title="Hover for device details">
        <span class="status-cluster-dots">
          <span class="status-dot" id="clusterDotPen"     aria-label="Pen"></span>
          <span class="status-dot" id="clusterDotWatch"   aria-label="Watch"></span>
          <span class="status-dot" id="clusterDotAirpods" aria-label="AirPods"></span>
          <span class="status-dot" id="clusterDotServer"  aria-label="Server"></span>
        </span>
        <span class="status-cluster-label" id="statusClusterLabel">connecting…</span>
        <span class="status-cluster-meta" id="statusClusterMeta"></span>

        <span class="status-hover-card" aria-hidden="true">
          <span class="status-hover-row" data-device="pen">
            <span class="status-hover-dot"></span>
            <span class="status-hover-label">Pen</span>
            <span class="status-hover-state" id="hoverPenState">offline</span>
            <span class="status-hover-meta"  id="hoverPenMeta">— Hz · —</span>
          </span>
          <span class="status-hover-row" data-device="watch">
            <span class="status-hover-dot"></span>
            <span class="status-hover-label">Watch</span>
            <span class="status-hover-state" id="hoverWatchState">offline</span>
            <span class="status-hover-meta"  id="hoverWatchMeta">— Hz · —</span>
          </span>
          <span class="status-hover-row" data-device="airpods">
            <span class="status-hover-dot"></span>
            <span class="status-hover-label">AirPods</span>
            <span class="status-hover-state" id="hoverAirpodsState">offline</span>
            <span class="status-hover-meta"  id="hoverAirpodsMeta">— Hz · —</span>
          </span>
          <span class="status-hover-row" data-device="server">
            <span class="status-hover-dot"></span>
            <span class="status-hover-label">Server</span>
            <span class="status-hover-state" id="hoverServerState">connecting</span>
            <span class="status-hover-meta"  id="hoverServerMeta">—</span>
          </span>
        </span>
      </button>
      <button type="button" class="theme-toggle" id="themeToggle"
              onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle light / dark">
        <span class="theme-toggle-glyph" id="themeToggleGlyph">☾</span>
      </button>
    </div>
  </div>

  <!-- Content -->
  <div id="content">

    <!-- Editorial date-strip: italic mono, oben über allen Pages. -->
    <div class="page-strip" id="pageStrip">
      <span class="page-strip-date" id="pageStripDate">–</span>
      <span class="page-strip-slash">/</span>
      <span class="page-strip-label" id="pageStripLabel">–</span>
    </div>

    <!-- ══════════ PAGE SLOTS (populated lazily by bootstrap) ══════════ -->
    <div class="page active" id="page-recording"     data-view="recording"></div>
    <div class="page"        id="page-sessions"      data-view="sessions"></div>
    <div class="page"        id="page-session-detail" data-view="session-detail"></div>
    <div class="page"        id="page-connections"   data-view="connections"></div>
    <div class="page"        id="page-system"        data-view="system"></div>

  </div><!-- /content -->
</main>

<footer id="site-footer">
  <div class="site-footer-left">
    <span>Noah Samel · Ben Kriegsmann · Tajuddin Snasni</span>
    <span class="site-footer-sep">·</span>
    <span>ML4SCS · Leuphana University · SS 26</span>
  </div>
  <div class="site-footer-right">
    <a href="https://github.com/noahsa16/ML4SCS_Burk_macht_Bock" target="_blank" rel="noopener">github</a>
  </div>
</footer>

<div id="toast"></div>

<script type="module" src="/static/dashboard.js"></script>
</body>
</html>
