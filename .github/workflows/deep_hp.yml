name: Deep-HP-Studie
on:
  workflow_dispatch:
    inputs:
      models: { description: "Architekturen (Komma; 'none' = nur custom)", default: "cnn,tcn,tcn6,lstm,gru,transformer" }
      pool:   { description: "Pool", type: choice, options: [legacy, modern], default: legacy }
      win:    { description: "Fenster in s", default: "5" }
      n_trials: { description: "Sobol-Trials/Arch", default: "16" }
      seeds:  { description: "Varianz-Seeds (Space)", default: "42 43 44" }
      trials: { description: "Sobol-Indizes (Komma; leer = alle)", default: "" }
      seed:   { description: "Trial-Seed (!=42 suffixt Namen mit -s{seed})", default: "42" }
      custom: { description: "Extra-Configs als JSON-Liste (model/name/lr/dropout/batch_size/weight_decay/seed)", default: "" }
      skip_collect: { description: "Collect-Job ueberspringen (Teil-Runs: Aggregation lokal)", type: boolean, default: false }
permissions:
  contents: read
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs: { matrix: "${{ steps.gen.outputs.matrix }}" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - run: pip install scipy numpy
      - id: gen
        env:
          MODELS: ${{ inputs.models }}
          POOL: ${{ inputs.pool }}
          WIN: ${{ inputs.win }}
          N_TRIALS: ${{ inputs.n_trials }}
          TRIALS: ${{ inputs.trials }}
          SEED: ${{ inputs.seed }}
          CUSTOM: ${{ inputs.custom }}
        run: echo "matrix=$(python scripts/ml/deep_hp_matrix.py)" >> "$GITHUB_OUTPUT"

  search:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy: { fail-fast: false, matrix: "${{ fromJSON(needs.prepare.outputs.matrix) }}" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13", cache: pip }
      - run: pip install -r requirements.txt
      - name: Daten
        env: { DATA_URL: "${{ secrets.SWEEP_DATA_URL }}" }
        # Why: der Hoster drosselt parallele Downloads teils mit einer
        # HTTP-200-Fehlerseite — curl -f greift nicht, erst der
        # Zip-Integritaetscheck erkennt das; daher Retry-Schleife.
        run: |
          if [ -z "$DATA_URL" ]; then echo "::error::SWEEP_DATA_URL fehlt"; exit 1; fi
          for i in 1 2 3 4 5; do
            curl -fsSL --retry 5 --retry-all-errors "$DATA_URL" -o sweep_data.zip \
              && unzip -tq sweep_data.zip >/dev/null 2>&1 && break
            echo "Download-Versuch $i defekt (Hoster-Throttle?) — warte $((i*20))s"
            rm -f sweep_data.zip
            if [ "$i" = 5 ]; then echo "::error::Daten-Download nach 5 Versuchen defekt"; exit 1; fi
            sleep $((i*20))
          done
          unzip -q sweep_data.zip
      - name: "Trial ${{ matrix.name }}"
        # Why: explizites `shell: bash` aktiviert -o pipefail — sonst
        # verschluckt die while-Pipe den Exit-Code eines Trial-Crashs
        # (Transformer-OOM-Jobs meldeten "success" ohne Artefakt).
        shell: bash
        run: |
          echo "### ${{ matrix.name }}" >> "$GITHUB_STEP_SUMMARY"
          ${{ matrix.cmd }} 2>&1 | while IFS= read -r l; do printf '%s\n' "$l"; \
            case "$l" in *"Fold "*) printf -- '- %s\n' "$l" >> "$GITHUB_STEP_SUMMARY";; esac; done
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "hp-trial-${{ matrix.name }}"
          path: "models/hp/${{ inputs.pool }}/trial_*.csv"
          if-no-files-found: warn

  collect:
    needs: search
    # Why: Teil-Runs (Nachzuegler-Trials, Varianz-Seeds) sehen nur die
    # eigenen Artefakte — collect wuerde auf Teildaten "Sieger" retrainieren
    # und bei teuren Archs das 300-min-Timeout reissen. Aggregation lokal.
    if: ${{ !inputs.skip_collect }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13", cache: pip }
      - run: pip install -r requirements.txt
      - name: Daten
        env: { DATA_URL: "${{ secrets.SWEEP_DATA_URL }}" }
        # Why: der Hoster drosselt parallele Downloads teils mit einer
        # HTTP-200-Fehlerseite — curl -f greift nicht, erst der
        # Zip-Integritaetscheck erkennt das; daher Retry-Schleife.
        run: |
          if [ -z "$DATA_URL" ]; then echo "::error::SWEEP_DATA_URL fehlt"; exit 1; fi
          for i in 1 2 3 4 5; do
            curl -fsSL --retry 5 --retry-all-errors "$DATA_URL" -o sweep_data.zip \
              && unzip -tq sweep_data.zip >/dev/null 2>&1 && break
            echo "Download-Versuch $i defekt (Hoster-Throttle?) — warte $((i*20))s"
            rm -f sweep_data.zip
            if [ "$i" = 5 ]; then echo "::error::Daten-Download nach 5 Versuchen defekt"; exit 1; fi
            sleep $((i*20))
          done
          unzip -q sweep_data.zip
      - name: Trial-Summaries einsammeln
        uses: actions/download-artifact@v4
        with:
          pattern: "hp-trial-*"
          merge-multiple: true
          path: "models/hp/${{ inputs.pool }}"
      - name: Collect (Sieger + Varianz + Report)
        run: |
          python -u scripts/ml/deep_hp_study.py --mode collect \
            --pool ${{ inputs.pool }} --win ${{ inputs.win }} \
            --seeds ${{ inputs.seeds }} --hp-dir "models/hp/${{ inputs.pool }}"
      - name: Report in Summary
        if: always()
        run: cat reports/deep_hp_study.md >> "$GITHUB_STEP_SUMMARY" || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "hp-study-result"
          path: |
            models/deep_hp_study_${{ inputs.pool }}.csv
            models/deep_hp_winners_${{ inputs.pool }}.csv
            models/deep_hp_winner_*_${{ inputs.pool }}_cv.csv
            reports/deep_hp_study.md
          if-no-files-found: warn
