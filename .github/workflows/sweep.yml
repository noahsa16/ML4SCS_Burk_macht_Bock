# LOSO-Sweep — fährt eine Batch aus Modellen + Parametern auf GitHubs Runnern
# (CPU), nicht auf deinem Mac. Die Matrix wird vom prepare-Job dynamisch aus den
# Eingabefeldern gebaut (scripts/ml/sweep_matrix.py) → Parameter variieren ohne
# YAML-Editieren. Jede Config ist ein eigener Job (parallel, fail-fast aus);
# der collect-Job baut daraus EINE Ergebnis-Tabelle (sweep_summary.md).
#
# Voraussetzung (einmalig): die gitignored Daten als Bundle hosten —
#   scripts/ops/pack_sweep_data.sh  → sweep_data.zip → hosten → dessen
#   Direkt-Download-URL als Repo-Secret SWEEP_DATA_URL hinterlegen.
name: LOSO-Sweep

on:
  workflow_dispatch:        # Knopf im Actions-Tab — Felder anpassen, "Run workflow"
    inputs:
      # --- Headline-Familien (Default = was der Cron faehrt) ---
      pools:
        description: "Headline-Pools (Komma) — legacy,modern"
        default: "legacy,modern"
      deep_models:
        description: "Override der Nightly-Deep-Liste als model:win (z.B. 'transformer:5'); leer = Default"
        default: ""
      augment:
        description: "Deep-Configs zusaetzlich mit Augmentation"
        type: choice
        options: [off, on]
        default: "off"
      # --- Alter breiter Explorations-Sweep (Dispatch-only) ---
      broad:
        description: "Statt Headline den alten breiten Sweep fahren (nutzt die models/gaps/windows/-Felder unten)"
        type: boolean
        default: false
      models:
        description: "[broad] Modelle (Komma) — rf,extratrees,histgb,logreg,svm_rbf,mlp,cnn,lstm,gru,tcn"
        default: "rf,extratrees,histgb,logreg,svm_rbf,mlp,cnn,lstm,gru,tcn"
      gaps:
        description: "[broad] RF Label-Gap-Sweep in ms (Komma; 'none' = aus)"
        default: "300,1000,2000,3000"
      windows:
        description: "[broad] RF Feature-Fenster in s, 50% Overlap (Komma; 'none' = aus)"
        default: "3,5"
      extras:
        description: "[broad] Kuratierte Extras (Overlap-Sweep + SVM/ExtraTrees-HP)"
        type: boolean
        default: true
      deep_wins:
        description: "[broad] Deep-Input-Fenster in s (Komma; 'none' = aus). CPU-Runner: langsam"
        default: "5,10"
  schedule:
    # Jede Nacht 02:00 UTC. Leerer inputs-Kontext → sweep_matrix-Default = die
    # drei HEADLINE-Familien (deep-Grossfenster + MLP-HP + RF+HMM) auf BEIDEN
    # Pools, ohne Augment, ohne breiten Sweep. Breit/Augment per Dispatch.
    - cron: "0 2 * * *"

permissions:
  contents: read

jobs:
  # Baut die Matrix aus den Eingaben (leer/Cron → volle Default-Matrix).
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - id: gen
        env:
          POOLS: ${{ inputs.pools }}
          DEEP_MODELS: ${{ inputs.deep_models }}
          AUGMENT: ${{ inputs.augment }}
          BROAD: ${{ inputs.broad }}
          MODELS: ${{ inputs.models }}
          GAPS: ${{ inputs.gaps }}
          WINDOWS: ${{ inputs.windows }}
          EXTRAS: ${{ inputs.extras }}
          DEEP_WINS: ${{ inputs.deep_wins }}
        run: |
          echo "matrix=$(python scripts/ml/sweep_matrix.py)" >> "$GITHUB_OUTPUT"

  sweep:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 300      # je Job; 5-s-Deep-Laeufe (tcn6) sind auf CPU lang. GitHub-Hardcap 6 h
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Abhängigkeiten
        run: pip install -r requirements.txt
      - name: Daten holen (gitignored → aus Secret SWEEP_DATA_URL)
        env:
          DATA_URL: ${{ secrets.SWEEP_DATA_URL }}
        run: |
          if [ -z "$DATA_URL" ]; then
            echo "::error::Secret SWEEP_DATA_URL fehlt — siehe scripts/ops/pack_sweep_data.sh"
            exit 1
          fi
          curl -fsSL "$DATA_URL" -o sweep_data.zip
          unzip -q sweep_data.zip          # entpackt nach data/
      - name: "Lauf · ${{ matrix.name }}"
        run: ${{ matrix.cmd }}
      - name: Metriken hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "cv-${{ matrix.name }}"
          path: models/*.csv
          if-no-files-found: warn

  collect:
    needs: sweep
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pandas tabulate
      - name: Alle Metriken einsammeln
        uses: actions/download-artifact@v4
        with:
          path: cvs
          pattern: cv-*
      - name: Ergebnis-Tabelle bauen
        run: python scripts/ml/sweep_collect.py cvs -o sweep_summary.md
      - name: Job-Summary anzeigen
        if: always()
        run: cat sweep_summary.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: SWEEP-SUMMARY
          path: sweep_summary.md
