# Augmentation-A/B (PARALLEL) — fährt das ehrliche aug-vs-no-aug-Experiment auf
# GitHubs CPU-Runnern. Jede (Seed, Bedingung)-Kombination ist EIN paralleler Job
# (scripts/ml/augment_matrix.py baut die Matrix), statt alle 6 sequentiell in
# einem Job (das lief in den 6-h-Bereich). Der collect-Job mittelt die Seeds und
# rechnet den gepaarten Wilcoxon (scripts/ml/augment_ab_collect.py).
#
# FORTSCHRITT ist auf drei Ebenen sichtbar:
#   1. Matrix      — 6 Jobs im Actions-Tab, du siehst "X/6 fertig".
#   2. Live-Log    — `python -u` (unbuffered) streamt die Per-Fold-Zeilen sofort
#                    ins Job-Log statt sie bis Job-Ende zu puffern.
#   3. Step-Summary — jede fertige Fold wird live an die Job-Summary angehängt
#                    (sichtbar ohne ins Roh-Log zu klicken).
#
# Daten: dasselbe Bundle wie der LOSO-Sweep (Repo-Secret SWEEP_DATA_URL). Für
# pool=modern muss das Bundle die trainable Modern-Sessions enthalten.
name: Augmentation-A/B

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Deep-Modell (tcn6 = 5-s-Headline-Architektur)"
        default: "tcn6"
      pool:
        description: "Pool: modern (Deploy-Ziel) oder legacy (N=15, engeres Band)"
        type: choice
        options: [modern, legacy]
        default: modern
      win:
        description: "Input-Fenster in s"
        default: "5"
      seeds:
        description: "Seeds (Leerzeichen-getrennt) — Mehr-Seed schlägt den Seed-Rausch-Floor (±1.7 pp)"
        default: "42 43 44"

permissions:
  contents: read

jobs:
  # Baut die Seed x {aug,no-aug}-Matrix aus den Eingaben.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - id: gen
        env:
          MODEL: ${{ inputs.model }}
          POOL: ${{ inputs.pool }}
          WIN: ${{ inputs.win }}
          SEEDS: ${{ inputs.seeds }}
        run: |
          echo "matrix=$(python scripts/ml/augment_matrix.py)" >> "$GITHUB_OUTPUT"

  # Ein Job je (Seed, Bedingung), alle parallel.
  run:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 180      # je Job EIN LOSO-Lauf; CPU-Runner sind langsam, aber nicht 6x
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Abhängigkeiten
        run: pip install -r requirements.txt
      - name: Daten holen (gitignored → aus Secret SWEEP_DATA_URL)
        env:
          DATA_URL: ${{ secrets.SWEEP_DATA_URL }}
        run: |
          if [ -z "$DATA_URL" ]; then
            echo "::error::Secret SWEEP_DATA_URL fehlt — siehe scripts/ops/pack_sweep_data.sh"
            exit 1
          fi
          curl -fsSL "$DATA_URL" -o sweep_data.zip
          unzip -q sweep_data.zip
      # Why: stdout per `python -u` (im cmd) unbuffered + jede "Fold "-Zeile live
      # an die Job-Summary -> Fortschritt sichtbar ohne ins Roh-Log zu klicken.
      # GitHubs Default-Shell hat `-eo pipefail`, ein Trainingsfehler bricht ab.
      - name: "Lauf · ${{ matrix.name }}"
        run: |
          echo "### ${{ matrix.name }} — Fold-Fortschritt (live)" >> "$GITHUB_STEP_SUMMARY"
          ${{ matrix.cmd }} 2>&1 | while IFS= read -r line; do
            printf '%s\n' "$line"
            case "$line" in
              *"Fold "*) printf -- '- %s\n' "$line" >> "$GITHUB_STEP_SUMMARY" ;;
            esac
          done
      - name: cv hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "cv-${{ matrix.name }}"
          path: models/deep_loso_*.csv
          if-no-files-found: warn

  # Seed-Mittel + gepaarter Wilcoxon über alle Jobs.
  collect:
    needs: run
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pandas scipy numpy tabulate
      - name: cv-Artefakte einsammeln
        uses: actions/download-artifact@v4
        with:
          path: cvs
          pattern: cv-*
      - name: Seed-Mittel + Wilcoxon
        run: python scripts/ml/augment_ab_collect.py cvs -o augment_ab_summary.md
      - name: Verdikt in die Job-Summary
        if: always()
        run: |
          if [ -f augment_ab_summary.md ]; then
            cat augment_ab_summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: AUGMENT-AB-SUMMARY
          path: augment_ab_summary.md
          if-no-files-found: warn
